<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover нужен чтобы webview корректно учитывал safe-area
         insets на iPhone (бордюры/чёлка). Без него внизу появляется
         белая полоса. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0f13" />
    <title>Cryox VPN</title>
    <!-- Шрифты дизайна: Space Grotesk (текст) + JetBrains Mono (моно-акценты). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Telegram WebApp JS API. Версия ?59 — последняя на момент написания
         (Bot API 9.0). Telegram сам подменяет ?N → стабильную версию для
         клиента, так что pin не критичен; но указываем для предсказуемости. -->
    <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
